#!/usr/sbin/nft -f
# CIA project — pfw-A firewall ruleset
# Site A firewall: WAN (enp0s1, wan-sim), LAN (enp0s2, siteA-lan), MGMT (enp0s3, Shared)

flush ruleset

# ============================================================
# Defines — names for readability
# ============================================================
define IFACE_WAN = "enp0s1"
define IFACE_LAN = "enp0s2"
define IFACE_MGMT = "enp0s3"

define NET_LAN_A   = 10.10.10.0/24
define NET_LAN_B   = 10.20.10.0/24
define NET_WAN_SIM = 10.255.0.0/24
define NET_MGMT    = 192.168.64.0/24

# ============================================================
# Main filter table — inet = both IPv4 and IPv6
# ============================================================
table inet filter {

    # ------------------------------------------------------------
    # INPUT: traffic destined to this firewall itself
    # ------------------------------------------------------------
    chain input {
        type filter hook input priority 0; policy drop;

        # Allow anything on the loopback interface
        iif lo accept

        # Allow established/related connections back in
        ct state established,related accept
        ct state invalid drop

        # Allow ICMP (ping, traceroute) from anywhere — useful for debug
        ip protocol icmp accept

        # Allow SSH only from MGMT interface
        iifname $IFACE_MGMT tcp dport 22 accept
        
        # Allow SSH from bastion-B
        ip saddr 10.20.10.10 tcp dport 22 accept
        # Allow IPsec from the WAN peer
        # IKE = UDP 500, NAT-T = UDP 4500, ESP = IP protocol 50
        iifname $IFACE_WAN udp dport { 500, 4500 } accept
        iifname $IFACE_WAN ip protocol esp accept

        # Log everything else we drop (rate-limited so disk doesn't fill)
        limit rate 5/second log prefix "[nft-input-drop] " flags all
        # Default: drop (set by policy)
    }

    # ------------------------------------------------------------
    # FORWARD: traffic passing THROUGH this firewall
    # ------------------------------------------------------------
    chain forward {
        type filter hook forward priority 0; policy drop;

        ct state established,related accept
        ct state invalid drop

        # LAN -> remote LAN (via IPsec tunnel — kernel marks tunneled pkts)
        iifname $IFACE_LAN ip saddr $NET_LAN_A ip daddr $NET_LAN_B accept
        iifname $IFACE_WAN ip saddr $NET_LAN_B ip daddr $NET_LAN_A accept

        # LAN -> internet via MGMT (NAT'd, see nat table below)
        # This is a dev convenience so LAN VMs can apt-update before the
        # real tunnel architecture is in place. Restrict/remove in prod.
        iifname $IFACE_LAN oifname $IFACE_MGMT accept

        limit rate 5/second log prefix "[nft-forward-drop] " flags all
    }

    # ------------------------------------------------------------
    # OUTPUT: traffic originated by this firewall itself
    # ------------------------------------------------------------
    chain output {
        type filter hook output priority 0; policy accept;
    }
}

# ============================================================
# NAT table — masquerade LAN -> MGMT for internet access
# ============================================================
table inet nat {
    chain postrouting {
        type nat hook postrouting priority 100; policy accept;

        # Masquerade LAN traffic leaving via MGMT so the upstream NAT
        # (UTM Shared Network) can route it back
        ip saddr $NET_LAN_A oifname $IFACE_MGMT masquerade
    }
}
