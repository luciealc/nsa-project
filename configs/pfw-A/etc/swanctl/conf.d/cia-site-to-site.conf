# CIA project — IPsec site-to-site VPN
# pfw-A (10.255.0.1, siteA-lan 10.10.10.0/24)
# pfw-B (10.255.0.2, siteB-lan 10.20.10.0/24)

connections {
    siteA-to-siteB {
        version = 2
        local_addrs  = 10.255.0.1
        remote_addrs = 10.255.0.2

        # IKE SA (phase 1) — how peers authenticate and set up the control channel
        proposals = aes256gcm16-prfsha384-ecp256
        dpd_delay = 30s

        local {
            auth = psk
            id   = pfw-A.cia.lab
        }
        remote {
            auth = psk
            id   = pfw-B.cia.lab
        }

        # Child SA (phase 2) — the actual encrypted tunnel for data
        children {
            lan-to-lan {
                local_ts  = 10.10.10.0/24
                remote_ts = 10.20.10.0/24

                esp_proposals = aes256gcm16-ecp256
                mode = tunnel
                start_action = trap
                dpd_action = restart
            }
        }
    }
}
