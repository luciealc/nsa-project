# CIA project — IPsec site-to-site VPN (pfw-B side)

connections {
    siteB-to-siteA {
        version = 2
        local_addrs  = 10.255.0.2
        remote_addrs = 10.255.0.1

        proposals = aes256gcm16-prfsha384-ecp256
        dpd_delay = 30s

        local {
            auth = psk
            id   = pfw-B.cia.lab
        }
        remote {
            auth = psk
            id   = pfw-A.cia.lab
        }

        children {
            lan-to-lan {
                local_ts  = 10.20.10.0/24
                remote_ts = 10.10.10.0/24

                esp_proposals = aes256gcm16-ecp256
                mode = tunnel
                start_action = trap
                dpd_action = restart
            }
        }
    }
}

secrets {
    ike-siteA-siteB {
        id-1 = pfw-B.cia.lab
        id-2 = pfw-A.cia.lab
        secret = "REDACTED_SEE_PSK_STORE"
    }
}
